    # а наш стек на urob/zmk main-3.5 (Zephyr 3.5, HW-model v1).
    # Снять заморозку — после миграции board на HW-model v2 + перехода на Zephyr 4.1.
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@c25e927a2fae
