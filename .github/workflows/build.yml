name: Build ZMK firmware
on:
  workflow_dispatch:
  push:
    paths-ignore:
      - "keymap-drawer/**"

jobs:
  build:
    # Заморожено на версии до Zephyr 4.1 (c06fa48, 2025-12-10): шаг
